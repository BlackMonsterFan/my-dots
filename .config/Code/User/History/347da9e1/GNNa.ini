[colors]
bg = #1a1a1a
bg-alt = #222222
fg = #eeeeee
fg-dim = #aaaaaa

orange = #ff8800
orange-light = #ffa733
orange-dark = #cc6d00

red = #ff5555
green = #50fa7b

[bar/example]
width = 100%
height = 32
radius = 8

fixed-center = true

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 3
line-color = ${colors.orange}

border-size = 0

padding-left = 2
padding-right = 2

font-0 = JetBrainsMono Nerd Font:size=11;2
font-1 = Symbols Nerd Font:size=11;2

modules-left = bspwm
modules-center = temperature cpu memory
modules-right = pulseaudio battery wlan bluetooth date

cursor-click = pointer

separator = "  "


#TEMPERATURE
[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 75

format = ÔčČ  <label>
format-foreground = ${colors.orange}

label = %temperature-c%


[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/bspwm]
type = internal/bspwm

label-focused = %name%
label-focused-background = ${colors.orange}
label-focused-foreground = ${colors.bg}
label-focused-padding = 2

label-occupied = %name%
label-occupied-foreground = ${colors.orange-light}
label-occupied-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.fg-dim}
label-empty-padding = 2

[module/pulseaudio]
type = internal/pulseaudio

format-volume = ÔÄ®  <label-volume>
format-muted = ÔĎ¶  muted

format-volume-foreground = ${colors.orange}
format-muted-foreground = ${colors.red}

label-volume = %percentage%%

[module/memory]
type = internal/memory
interval = 2

format = ÓŅÖ <label>
format-foreground = ${colors.orange}

label = %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2

format = Ôíľ <label>
format-foreground = ${colors.orange}

label = %percentage%%

[module/wlan]
type = internal/network
interface = wlan0
interval = 3

format-connected = Ôáę  %essid%
format-disconnected = ‚ĚĆ

format-connected-foreground = ${colors.orange}
format-disconnected-foreground = ${colors.red}

[module/bluetooth]
type = custom/script
exec = rfkill list bluetooth | grep -q "Soft blocked: no" && echo "ÔäĒ ON" || echo "ÔäĒ OFF"
interval = 3
click-left = blueman-manager
format-foreground = ${colors.orange}

[module/date]
type = internal/date
interval = 1

date = %d.%m.%Y
time = %H:%M

format = ÔĀ≥  <label>
format-foreground = ${colors.orange}

label = %date%  ÔÄó  %time%

[module/battery]
type = internal/battery
battery = BAT1
adapter = AC
full-at = 98

format-discharging = <ramp-capacity> <bar-capacity> <label-discharging>
format-charging = Ôá¶  <label-charging>
format-full = ÔČÄ  100%

label-discharging = %percentage%%
label-discharging-font = 0
label-discharging-foreground = ${colors.orange}

label-charging = %percentage%%
label-charging-foreground = ${colors.green}

; Bigger ramp icons
ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

ramp-capacity-foreground = ${colors.orange}

; Bigger bar
bar-capacity-width = 14
bar-capacity-fill = ‚Ėą
bar-capacity-empty = ‚ĖĎ
bar-capacity-indicator = ‚Ēā

bar-capacity-fill-foreground = ${colors.orange}
bar-capacity-empty-foreground = ${colors.bg-alt}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
