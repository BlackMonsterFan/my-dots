[module/round-left]
type = custom/text
content = %{T3} %{T-}
content-foreground = #2b2f37

[module/round-right]
type = custom/text
content = %{T3}%{T-}
content-foreground = #2b2f37

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 70

format = <ramp> <label>
format-warn = <ramp> <label-warn>
format-padding = 0 
label = %temperature%
label-foreground = #e6d5c3
label-warn = %temperature%
label-warn-foreground = #f7768e
ramp-0 = ""
ramp-foreground = #ff9e64

[module/bspwm]
type = internal/bspwm

pin-workspaces = true
inline-mode = true
enable-click = true
enable-scroll = true
reverse-scroll = false

format = <label-state>
ws-icon-0 = 1;%{F#ff9e64}1
ws-icon-1 = 2;%{F#ff9e64}2
ws-icon-2 = 3;%{F#ff9e64}3
ws-icon-3 = 4;%{F#ff9e64}4
ws-icon-4 = 5;%{F#ff9e64}5
ws-icon-5 = 6;%{F#ff9e64}6
ws-icon-6 = 7;%{F#ff9e64}7
ws-icon-7 = 8;%{F#ff9e64}8
ws-icon-8 = 9;%{F#ff9e64}9

label-separator = ""
label-separator-background = #2b2f37

label-focused =  %icon%  
label-focused-foreground = #ff9e64
label-focused-underline =  #ff9e64
label-focused-padding = 1
label-focused-background = #2b2f37

label-occupied = %icon%
label-occupied-foreground = #e0af68
label-occupied-background = #2b2f37
label-occupied-padding = 1

label-empty = %icon%
label-empty-foreground = #414868
label-empty-padding = 1
label-empty-background = #2b2f37

label-urgent = %icon%
label-urgent-foreground = #f7768e
label-urgent-background = #2b2f37
label-urgent-padding = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume = %{F#ff9e64}%{F-}  <label-volume>
format-muted = %{F#414868}%{F-}  muted

format-volume-foreground = #e6d5c3
format-muted-foreground = #414868

label-volume = %percentage%%

[module/time]
type = internal/date
interval = 1

; Без милиць із %{F...}, тільки чистий текст
date = %H:%M
date-alt = %a, %d %b %Y

format = <label>
format-background = #2b2f37
format-prefix = "  "
format-prefix-foreground = #ff9e64

label = %date%
label-foreground = #e6d5c3

[module/memory]
type = internal/memory
interval = 2
format = <label>
format-prefix = " "
format-padding = 1
format-prefix-foreground = #ff9e64
label = %gb_used%
label-foreground = #e6d5c3

[module/filesystem]
type = custom/text 
content =" " 
content-padding =1
click-left = rofi -show drun
content-foreground = #ff9e64

[module/wlan]
type = internal/network
interface = wlan0
interval = 3.0
format-connected =  <label-connected>
label-connected = "%{A1:sh $HOME/bin/wifimenu:}%{F#ff9e64}%{F-} %{A}"
label-connected-foreground = #e6d5c3 
format-disconnected = <label-disconnected>
label-disconnected = "%{A1:sh $HOME/bin/wifimenu:}%{F#f7768e}󰖪%{F-} %{A}"
label-disconnected-foreground = #f7768e

[module/ethernet]
type = internal/network
interface = ${system.network_interface_wired}
format-connected = <label-connected>
format-connected-prefix = "󰈁 "
format-connected-prefix-foreground = #ff9e64
format-connected-padding = 1
format-disconnected = <label-disconnected>
format-disconnected-prefix = "󰈂 "
format-disconnected-prefix-foreground = #414868
format-disconnected-padding = 1
label-connected = "%{A1:networkmanager_dmenu &:}%downspeed%|%upspeed%%{A}"
label-connected-foreground = #e6d5c3
label-disconnected = "%{A1:networkmanager_dmenu &:}Offline%{A}"

[module/battery]
type = internal/battery
full-at = 98
low-at = 10

battery = BAT1
adapter = ACAD
poll-interval = 5

time-format = %H:%M
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>
format-low = <label-low> <animation-low>

label-charging = "%percentage%% "
label-discharging = "%percentage%% "
label-full = " 100% "
label-low = "%percentage% "

ramp-capacity-0 = " "
ramp-capacity-1 = " "
ramp-capacity-2 = " "
ramp-capacity-3 = " "
ramp-capacity-4 = " "
bar-capacity-width = 10

animation-charging-0 = " "
animation-charging-1 = " "
animation-charging-2 = " "
animation-charging-3 = " "
animation-charging-4 = " "
animation-charging-framerate = 910

animation-discharging-0 = " "
animation-discharging-1 = " "
animation-discharging-2 = " "
animation-discharging-3 = " "
animation-discharging-4 = " "
animation-discharging-framerate = 500

animation-low-0 = "  "
animation-low-1 = "  "
animation-low-framerate = 1500

animation-low-foreground = #f7768e
format-charging-foreground = #e6d5c3
label-charging-foreground = #e6d5c3
format-discharging-foreground = #e6d5c3
label-discharging-foreground = #e6d5c3
format-full-prefix-foreground = #ff9e64
format-foreground = #e6d5c3
format-background = #2b2f37
ramp-capacity-foreground = #ff9e64  
animation-charging-foreground = #ff9e64 

[module/backlight]
type = custom/script
; Витягуємо готовий відсоток напряму з brightnessctl
exec = brightnessctl -m | cut -d, -f4

; Оновлюємо кожні 0.1 секунди для миттєвої реакції на колесико
interval = 0.1

format = <label>
format-prefix = "  "
format-prefix-foreground = #ff9e64
format-padding = 1

; Ті самі команди на прокрутку, але тепер із миттєвим виводом
label = %{A4:brightnessctl set 5%+:}%{A5:brightnessctl set 5%-:}%output%%{A}%{A}
label-foreground = #e6d5c3

[module/powermenu]
type = custom/text 
content =" " 
content-padding = 1
click-left = sh $HOME/bin/powermenu &
content-foreground = #f7768e

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " " 
format = <label>
label = %percentage%%
format-prefix-foreground = #ff9e64
label-foreground = #e6d5c3

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...
label-foreground = #e6d5c3

[module/space]
type = custom/text
content = " "

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock

format = <label-layout> <label-indicator>
format-prefix = " "
format-prefix-foreground = #ff9e64

label-layout = %layout%
label-layout-foreground = #e6d5c3

label-indicator-on = %name%
layout-icon-default = some-icon
layout-icon-0 = ru
layout-icon-1 = us
label-indicator-on-capslock = !
label-indicator-off-capslock =