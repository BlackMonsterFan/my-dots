[colors]
; Глибокий чорний фон (як у твоїх улюблених темах)
background = #1a1b26
; Колір тексту (світло-сірий)
foreground = #a9b1d6
; Твій фірмовий помаранчевий (акценти)
primary = #ff9e64
; Вторинний помаранчевий (менш яскравий)
secondary = #e0af68
; Колір для попереджень (червоно-помаранчевий)
alert = #f7768e
; Колір для неактивних елементів
disabled = #414868
