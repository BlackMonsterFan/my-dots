# --- Backend ---
backend = "glx";
vsync = true;
use-damage = false;
unredir-if-possible = false;

# --- Твій стиль ---
opacity-rule = [
  "90:class_g = 'Alacritty'",
  "90:class_g = 'Rofi'",
  "95:class_g = 'Thunar'"
];

corner-radius = 10;

# --- Правила для шпалер ---
# Це змушує Picom ігнорувати шар, на якому малюється відео
shadow-exclude = [ "class_g = 'mpv'", "window_type = 'desktop'" ];
blur-background-exclude = [ "class_g = 'mpv'", "window_type = 'desktop'" ];

wintypes:
{
  desktop = { shadow = false; blur-background = false; };
};
