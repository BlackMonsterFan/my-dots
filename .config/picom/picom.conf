# --- Анімації та розмиття ---
backend = "glx";
# glx-no-stencil = true;
glx-copy-from-front = false;

# --- Розмиття (Blur) ---
# Це зробить фон за терміналом "скляним"
blur: {
  method = "dual_kawase";
  strength = 5;
  background = true;
  background-frame = false;
  background-fixed = false;
}

# --- Прозорість ---
# Alacritty та Rofi будуть напівпрозорими
opacity-rule = [
  "90:class_g = 'Alacritty'",
  "90:class_g = 'Rofi'",
  "95:class_g = 'Thunar'"
];

# --- Заокруглення кутів ---
# Як у твоїх модулях Polybar
corner-radius = 10;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# --- Тіні ---
# Додаємо об'єму вікнам
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.4;
shadow-color = "#000000";

# --- Налаштування для NVIDIA ---
vsync = true;
use-damage = true;

focus-exclude = [ "class_g = 'mpv'" ];
blur-background-exclude = [ "class_g = 'mpv'" ];
shadow-exclude = [ "class_g = 'mpv'" ];
# --- Загальні налаштування ---
